<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Save to Sam — Settings</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 14px/1.5 system-ui, sans-serif;
        max-width: 460px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 { font-size: 18px; }
      label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
      input { width: 100%; padding: 0.5rem; box-sizing: border-box; font: inherit; }
      button {
        margin-top: 1rem; padding: 0.5rem 1rem; font: inherit;
        border: 0; border-radius: 6px; background: #d64541; color: #fff; cursor: pointer;
      }
      .status { margin-top: 1rem; padding: 0.5rem 0.75rem; border-radius: 6px; background: rgba(127,127,127,0.12); }
      .ok { color: #2ecc71; }
      .muted { opacity: 0.7; font-size: 13px; }
      code { background: rgba(127,127,127,0.18); padding: 0 4px; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>Save to Sam</h1>
    <p class="muted">
      Open your Samizdat instance in a tab and the extension connects
      automatically. Use this page only to set the server URL by hand.
    </p>

    <label for="server">Server URL</label>
    <input id="server" type="url" placeholder="https://sam.example.com" />
    <button id="save">Save</button>

    <div class="status" id="status">Checking…</div>

    <script src="options.js"></script>
  </body>
</html>
